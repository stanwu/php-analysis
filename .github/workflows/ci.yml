name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Unit tests (claude)
        run: make -C claude test

      - name: Unit tests (codex)
        run: make -C codex test

      - name: Unit tests (gemini)
        run: make -C gemini test

      - name: Lint (claude)
        run: make -C claude lint

